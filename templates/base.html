<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #1a1a2e; padding-top: 20px; }
        .sidebar a { color: #ccc; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover { background: #16213e; color: white; }
        .sidebar .brand { color: white; font-size: 1.5rem; font-weight: bold; padding: 10px 20px 20px; }
        .main-content { padding: 30px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        {% if user.is_authenticated %}
        <div class="col-md-2 sidebar">
            <div class="brand"><i class="bi bi-wallet2"></i> FinTrack</div>
            <a href="/dashboard/"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/transacciones/gastos/"><i class="bi bi-arrow-down-circle"></i> Gastos</a>
            <a href="/transacciones/ingresos/"><i class="bi bi-arrow-up-circle"></i> Ingresos</a>
            <a href="/presupuesto/"><i class="bi bi-piggy-bank"></i> Presupuesto</a>
            
            <hr style="border-color:#444;">
            <a href="/transacciones/reporte/"><i class="bi bi-file-earmark-bar-graph"></i> Exportar Reporte</a>
            <hr style="border-color:#444;">
            <a href="/usuarios/logout/"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
        </div>
        <div class="col-md-10 main-content">
        {% else %}
        <div class="col-12 main-content">
        {% endif %}
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
