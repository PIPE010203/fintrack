{% extends 'base.html' %}
{% block content %}
<div class="form-card" style="text-align:center;">
    <div class="form-icon"><i class="bi bi-person-plus"></i></div>
    <h4>Crear cuenta</h4>
    <p class="form-subtitle">Empieza a controlar tus finanzas hoy</p>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        {% include 'partials/form_field.html' %}
        {% endfor %}
        <button type="submit" class="btn-submit">
            <i class="bi bi-person-check"></i> Crear cuenta
        </button>
    </form>
    <p style="margin-top:20px; font-size:13px; color:var(--text-secondary);">
        ¿Ya tienes cuenta? <a href="/usuarios/login/" style="color:var(--accent); font-weight:600;">Inicia sesión</a>
    </p>
</div>
{% endblock %}
