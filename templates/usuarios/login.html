{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-wallet2"></i> FinTrack</h3>
                <h5 class="text-center text-muted mb-4">Iniciar sesión</h5>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                <hr>
                <p class="text-center">¿No tienes cuenta? <a href="/usuarios/registro/">Regístrate</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
