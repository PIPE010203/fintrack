{% extends 'base.html' %}
{% block content %}
<div class="form-card" style="text-align:center;">
    <div class="form-icon"><i class="bi bi-wallet2"></i></div>
    <h4>Bienvenido a FinTrack</h4>
    <p class="form-subtitle">Inicia sesión para continuar</p>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        {% include 'partials/form_field.html' %}
        {% endfor %}
        <button type="submit" class="btn-submit">
            <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
        </button>
    </form>
    <p style="margin-top:20px; font-size:13px; color:var(--text-secondary);">
        ¿No tienes cuenta? <a href="/usuarios/registro/" style="color:var(--accent); font-weight:600;">Regístrate</a>
    </p>
</div>
{% endblock %}
